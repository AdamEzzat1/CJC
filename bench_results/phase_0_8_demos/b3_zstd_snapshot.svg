<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880" height="460" font-family="ui-monospace, Menlo, Consolas, monospace">
  <style>
    .title { font-size: 16px; font-weight: bold; fill: #222; }
    .label { font-size: 12px; fill: #444; }
    .value-label { font-size: 11px; fill: #fff; font-weight: bold; }
    .ratio-label { font-size: 12px; fill: #2e7d32; font-weight: bold; }
    .axis { stroke: #888; stroke-width: 1; }
    .legend-text { font-size: 12px; fill: #444; }
  </style>
  <rect width="100%" height="100%" fill="#fafafa" />
  <text x="20" y="28" class="title">B3 — ZSTD Snapshot Compression (level 3)</text>
  <text x="20" y="48" class="label">Uncompressed vs zstd-compressed bytes; ratio annotated above each pair</text>
  <rect x="188" y="354" width="60" height="6" fill="#4a90d9" />
  <text x="218" y="370" text-anchor="middle" class="value-label">14127 B</text>
  <rect x="256" y="357" width="60" height="3" fill="#2e7d32" />
  <text x="286" y="373" text-anchor="middle" class="value-label">7614 B</text>
  <text x="252" y="346" text-anchor="middle" class="ratio-label">1.86×</text>
  <text x="252" y="382" text-anchor="middle" class="label">n=100</text>
  <rect x="376" y="304" width="60" height="56" fill="#4a90d9" />
  <text x="406" y="320" text-anchor="middle" class="value-label">137427 B</text>
  <rect x="444" y="329" width="60" height="31" fill="#2e7d32" />
  <text x="474" y="345" text-anchor="middle" class="value-label">74920 B</text>
  <text x="440" y="296" text-anchor="middle" class="ratio-label">1.83×</text>
  <text x="440" y="382" text-anchor="middle" class="label">n=1000</text>
  <rect x="564" y="80" width="60" height="280" fill="#4a90d9" />
  <text x="594" y="96" text-anchor="middle" class="value-label">685427 B</text>
  <rect x="632" y="206" width="60" height="154" fill="#2e7d32" />
  <text x="662" y="222" text-anchor="middle" class="value-label">376345 B</text>
  <text x="628" y="72" text-anchor="middle" class="ratio-label">1.82×</text>
  <text x="628" y="382" text-anchor="middle" class="label">n=5000</text>
  <line class="axis" x1="40" y1="360" x2="840" y2="360" />
  <rect x="40" y="419" width="14" height="14" fill="#4a90d9" />
  <text x="60" y="430" class="legend-text">uncompressed (ABNG\x0E magic)</text>
  <rect x="280" y="419" width="14" height="14" fill="#2e7d32" />
  <text x="300" y="430" class="legend-text">zstd level 3 (ABNGZ\x01 magic)</text>
</svg>
