name: cjc-cronos-gan Cross-Platform Determinism

# Phase 1-5 cross-platform determinism gate for cjc-cronos-gan. Verifies that
# the SSM + Liquid forward+rollouts, the supervised training loop, the
# disagreement scoring, the experiment-harness replay hash, and the proptest
# determinism invariants produce byte-identical results on Linux + Windows +
# macOS.
#
# Three jobs run per platform with `fail-fast: false` so divergences on any
# one platform surface in the same CI run rather than cascading.

on:
  push:
    branches: [master, main]
    paths:
      - 'crates/cjc-cronos-gan/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/cjc-cronos-gan-determinism.yml'
  pull_request:
    branches: [master, main]
    paths:
      - 'crates/cjc-cronos-gan/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/cjc-cronos-gan-determinism.yml'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  cronos-gan-determinism:
    name: cjc-cronos-gan Determinism (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cronos-gan-determinism

      # Gate 1 — Phase 1 + Phase 3 inline unit tests (~53 tests)
      # Cover: temporal primitives, SSM construction + rollout + byte-id,
      # Liquid construction + rollout + tau bounds, disagreement scoring,
      # TemporalGan rollout + run-id stability, datasets, experiment harness.
      - name: Gate 1 — cjc-cronos-gan inline unit tests
        run: cargo test -p cjc-cronos-gan --release --lib

      # Gate 2 — Phase 2 supervised training integration tests (~12 tests)
      # Cover: param round-trip exactness, autograd vs finite-difference
      # gradient match (FD relative error < 1e-4 SSM, < 5e-4 Liquid),
      # training-loss decrease on toy task, *byte-identical training
      # trajectory across runs* (the determinism-replay claim).
      - name: Gate 2 — cjc-cronos-gan training integration tests
        run: cargo test -p cjc-cronos-gan --release --test test_training

      # Gate 3 — Phase 5 proptest suite (~10 properties × 64-256 cases each)
      # Cover: sequence-length invariant, same-seed determinism (random
      # seed), finite-bounded ⇒ finite-output, loss finiteness, disagreement
      # non-negativity, rollout determinism on repeated calls.
      - name: Gate 3 — cjc-cronos-gan proptest suite
        run: cargo test -p cjc-cronos-gan --release --test test_proptest

      # Gate 4 — doctest in lib.rs quick-start example
      - name: Gate 4 — cjc-cronos-gan doctests
        run: cargo test -p cjc-cronos-gan --release --doc

  cronos-gan-byte-identity-check:
    name: cjc-cronos-gan Byte-Identity (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cronos-gan-determinism

      # Run an experiment and emit its replay_hash to a known artifact.
      # When all three matrix runs upload the same artifact value, the
      # cross-platform byte-identity claim is verified at the *highest*
      # level of the pipeline (full train + disagreement + hash).
      - name: Emit experiment replay hash
        run: |
          cargo test -p cjc-cronos-gan --release --test test_proptest -- --nocapture \
            ssm_same_seed_byte_identical_rollout liquid_same_seed_byte_identical_rollout \
            ssm_repeated_rollout_byte_identical
        shell: bash
