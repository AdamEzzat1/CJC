[package]
name = "cjc-seshat"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "Seshat — deterministic cross-language causal profiler for Python/Rust systems: cross-language flamegraphs, Py↔Rust boundary cost, copy detection, GIL/lock contention, async stalls, memory ownership, peak attribution, and evidence-grounded recommendations"
publish = false

[dependencies]
# Only needed for the `.cjcl`-facing satellite dispatch (Value marshalling).
# The trace model + analysis engine are pure and dependency-free.
cjc-runtime = { workspace = true }

# Native stack unwinding for the live Rust collector's automatic allocation-site
# attribution. OPTIONAL and pulled in ONLY by `collect-live` — the default
# analysis build (and the whole deterministic core) stays dependency-free.
backtrace = { version = "0.3", optional = true }

[features]
default = []
# Live OS-level collectors (Rust GlobalAlloc shim + native unwinding, CPython
# frame walk, perf_event counters). Nondeterministic by nature — quarantined
# behind this gate so the default build/test surface stays bit-identical.
collect-live = ["dep:backtrace"]

[dev-dependencies]
proptest = "1"
bolero = "0.13.4"
