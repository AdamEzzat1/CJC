[package]
name = "cjc-vizor"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "Grammar-of-graphics visualization library for CJC"

[dependencies]
cjc-runtime = { workspace = true }
cjc-repro = { workspace = true }

[features]
default = []
png = ["dep:png", "dep:flate2"]

[dependencies.png]
version = "0.17"
optional = true

[dependencies.flate2]
version = "1"
optional = true
