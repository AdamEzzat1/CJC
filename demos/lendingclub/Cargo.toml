[package]
name = "lendingclub-demo"
version = "0.1.11"
edition = "2021"
publish = false
description = "Locke demo: target-leakage audit on the LendingClub 2007-2018 dataset"

[[bin]]
name = "lendingclub_demo"
path = "src/main.rs"

[[bin]]
name = "honest_model"
path = "src/bin/honest_model.rs"

[lib]
name = "lendingclub_demo"
path = "src/lib.rs"

[dependencies]
cjc-data = { path = "../../crates/cjc-data" }
cjc-locke = { path = "../../crates/cjc-locke" }
cjc-runtime = { path = "../../crates/cjc-runtime" }
flate2 = "1"

[dev-dependencies]
tempfile = "3"
